<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portol - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0a; color: #e5e5e5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px;
    }
    .container { text-align: center; max-width: 320px; }
    .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 14px; color: #888; line-height: 1.5; margin-bottom: 24px; }
    button {
      background: #1a8a8a; color: white; border: none; padding: 12px 24px;
      border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>Portol needs an internet connection to sync your data. Check your connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
